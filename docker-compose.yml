services:
  django:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000

  nginx:
    image: nginx:latest
    depends_on:
      - django
    ports:
      - "9443:9443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/cert/rudilink.tech:/opt/cert/rudilink.tech:ro